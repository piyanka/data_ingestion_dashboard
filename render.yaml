databases:
  - name: breathe-esg-db
    plan: free

services:
  - type: web
    name: breathe-esg-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-esg-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: breathe-esg-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://breathe-esg-ui.onrender.com
